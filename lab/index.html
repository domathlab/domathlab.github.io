<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Domath Lab | 互动数学实验室</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;700&family=Noto+Sans+SC:wght@300;400;700&display=swap');
    
    :root {
      --domath-beige: #f5f1e8;
      --domath-green: #243a34;
      --domath-red: #cf422b;
      --domath-white: #fffaf0;
    }

    body {
      background-color: var(--domath-beige);
      color: var(--domath-green);
      font-family: 'Noto Serif SC', serif;
    }

    .domath-card {
      background-color: var(--domath-white);
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      border: 1px solid rgba(36, 58, 52, 0.08);
    }

    .domath-card:hover {
      transform: translateY(-8px);
      box-shadow: 0 20px 25px -5px rgba(36, 58, 52, 0.1), 0 10px 10px -5px rgba(36, 58, 52, 0.04);
      border-color: var(--domath-red);
    }

    .btn-primary {
      background-color: var(--domath-red);
      color: white;
      transition: all 0.2s;
    }

    .btn-primary:hover {
      background-color: #b03825;
      transform: scale(1.02);
    }

    .tab-active {
      color: var(--domath-red);
      border-bottom: 2px solid var(--domath-red);
    }

    /* 纸张纹理感 */
    .paper-texture {
      background-image: url("https://www.transparenttextures.com/patterns/natural-paper.png");
    }
  </style>
</head>
<body class="paper-texture min-h-screen">

  <!-- Header -->
  <header class="py-12 px-6 text-center">
    <div class="max-w-4xl mx-auto">
      <h1 class="text-4xl md:text-5xl font-bold mb-4 tracking-tight">Domath Lab</h1>
      <p class="text-lg opacity-80 font-light mb-8 italic">「 看见数学 ｜ 爱上数学 」</p>
      <div class="h-1 w-24 bg-[#cf422b] mx-auto mb-12"></div>
    </div>
  </header>

  <!-- Main Content -->
  <main class="max-w-6xl mx-auto px-6 pb-24">
    
    <!-- Filter Tabs -->
    <div class="flex flex-wrap justify-center gap-8 mb-16 text-sm font-bold tracking-widest uppercase border-b border-[#243a34]/10 pb-4" id="filterTabs">
      <button class="tab-btn tab-active pb-2" data-category="all">全部资源</button>
      <button class="tab-btn hover:text-[#cf422b] transition pb-2" data-category="logic">逻辑推理</button>
      <button class="tab-btn hover:text-[#cf422b] transition pb-2" data-category="geometry">空间几何</button>
      <button class="tab-btn hover:text-[#cf422b] transition pb-2" data-category="motor">精细动作</button>
    </div>

    <!-- Games Grid -->
    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-10" id="gamesGrid">
      
      <!-- Card 1: Geometric Window Puzzle -->
      <article class="domath-card rounded-3xl overflow-hidden flex flex-col h-full" data-tags="geometry motor">
        <div class="relative h-56 bg-indigo-100 flex items-center justify-center overflow-hidden">
          <div class="grid grid-cols-3 gap-2 p-4 w-40 h-40 bg-white shadow-lg rotate-12">
            <div class="bg-red-400 rounded"></div>
            <div class="bg-blue-400 rounded"></div>
            <div class="bg-yellow-400 rounded"></div>
            <div class="bg-green-400 rounded"></div>
            <div class="border-2 border-dashed border-gray-400 rounded"></div>
            <div class="bg-indigo-400 rounded"></div>
            <div class="bg-pink-400 rounded"></div>
            <div class="bg-orange-400 rounded"></div>
            <div class="border-2 border-dashed border-gray-400 rounded"></div>
          </div>
          <div class="absolute inset-0 bg-gradient-to-t from-black/20 to-transparent"></div>
          <span class="absolute top-4 left-4 bg-white/90 px-3 py-1 text-[10px] font-bold rounded-full uppercase tracking-tighter">空间几何</span>
        </div>
        <div class="p-8 flex-1 flex flex-col">
          <h2 class="text-2xl font-bold mb-3">几何窗口拼图</h2>
          <p class="text-sm opacity-70 leading-relaxed mb-8 flex-1">
            结合数字设计与实体拼图操作。训练空间概念、视觉辨识与弹性思考能力。
          </p>
          <div class="flex items-center gap-3">
            <a href="./puzzle/" class="btn-primary flex-1 text-center py-3 rounded-xl font-bold text-sm">
              <i class="fa-solid fa-play mr-2"></i> 开始设计
            </a>
            <button class="w-12 h-12 border border-[#243a34]/20 rounded-xl flex items-center justify-center hover:bg-white hover:text-[#cf422b] transition" title="下载打印模板">
              <i class="fa-solid fa-download"></i>
            </button>
          </div>
        </div>
      </article>

      <!-- Card 2: Kakuro Puzzle -->
      <article class="domath-card rounded-3xl overflow-hidden flex flex-col h-full" data-tags="logic">
        <div class="relative h-56 bg-emerald-900 flex items-center justify-center overflow-hidden">
          <div class="grid grid-cols-2 gap-1 w-40 h-40">
            <div class="bg-[#243a34] relative border border-white/10">
              <div class="absolute top-1 right-2 text-white text-[10px]">16</div>
              <div class="absolute bottom-1 left-2 text-white text-[10px]">24</div>
              <div class="absolute inset-0 border-t border-white/20 rotate-45 origin-top-left scale-[1.414]"></div>
            </div>
            <div class="bg-white flex items-center justify-center text-xl font-bold">7</div>
            <div class="bg-white flex items-center justify-center text-xl font-bold">9</div>
            <div class="bg-[#243a34] relative border border-white/10">
               <div class="absolute top-1 right-2 text-white text-[10px]">10</div>
               <div class="absolute inset-0 border-t border-white/20 rotate-45 origin-top-left scale-[1.414]"></div>
            </div>
          </div>
          <div class="absolute inset-0 bg-gradient-to-t from-black/20 to-transparent"></div>
          <span class="absolute top-4 left-4 bg-white/90 px-3 py-1 text-[10px] font-bold rounded-full uppercase tracking-tighter">逻辑推理</span>
        </div>
        <div class="p-8 flex-1 flex flex-col">
          <h2 class="text-2xl font-bold mb-3">数和谜题 (Kakuro)</h2>
          <p class="text-sm opacity-70 leading-relaxed mb-8 flex-1">
            结合填字游戏与数学运算的逻辑谜题。在不重复数字的前提下填满空格，挑战大脑的极限。
          </p>
          <div class="flex items-center gap-3">
            <a href="./kakuro/" class="btn-primary flex-1 text-center py-3 rounded-xl font-bold text-sm">
              <i class="fa-solid fa-play mr-2"></i> 立即挑战
            </a>
            <button class="w-12 h-12 border border-[#243a34]/20 rounded-xl flex items-center justify-center hover:bg-white hover:text-[#cf422b] transition" title="下载题目手册">
              <i class="fa-solid fa-file-pdf"></i>
            </button>
          </div>
        </div>
      </article>

      <!-- Card 3: More coming soon... -->
      <article class="domath-card rounded-3xl overflow-hidden flex flex-col h-full opacity-60 border-dashed border-2">
        <div class="h-56 bg-slate-100 flex items-center justify-center">
          <i class="fa-solid fa-plus text-4xl text-slate-300"></i>
        </div>
        <div class="p-8 flex-1 flex flex-col items-center justify-center text-center">
          <h2 class="text-xl font-bold mb-2 text-slate-400">更多有趣挑战</h2>
          <p class="text-xs text-slate-400 italic">正在实验室孵化中...</p>
        </div>
      </article>

    </div>
  </main>

  <!-- Footer -->
  <footer class="py-12 border-t border-[#243a34]/10 text-center">
    <p class="text-xs opacity-50 tracking-widest">&copy; 2026 DOMATH LAB. ALL RIGHTS RESERVED.</p>
  </footer>

  <script>
    document.querySelectorAll('.tab-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.tab-btn').forEach(t => t.classList.remove('tab-active'));
        btn.classList.add('tab-active');
        const category = btn.dataset.category;
        document.querySelectorAll('.domath-card').forEach(card => {
          const tags = card.dataset.tags || "";
          if (category === 'all' || tags.includes(category)) {
            card.style.display = 'flex';
          } else {
            card.style.display = 'none';
          }
        });
      });
    });
  </script>
</body>
</html>
